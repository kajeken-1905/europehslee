<body class="text-on-surface hero-bg min-h-screen">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect, useRef } = React;
    const { motion, AnimatePresence } = window.Motion;
    
    // We use CITIES from window.CITIES populated by citiesData.js
    const CITIES = window.CITIES || [];

    const OPENAI_API_URL = 'https://api.openai.com/v1/chat/completions';
    const API_KEY_STORAGE = 'espana_voyage_openai_api_key';
    const MODEL_STORAGE = 'espana_voyage_openai_model';

    const summarizeCity = (city) => {
      if (!city) return '';
      const lines = [
        `【${city.nameKo} / ${city.nameEs} / ${city.nameEn}】`,
        city.intro,
        city.population && `인구: ${city.population}`,
        city.area && `면적: ${city.area}`,
      ];
      if (city.attractions?.length) {
        lines.push('명소: ' + city.attractions.map(a => `${a.name} — ${a.desc}`).join(' | '));
      }
      if (city.football?.teams?.length) {
        lines.push('축구: ' + city.football.teams.map(t =>
          `${t.teamKo || t.team} (${t.stadiumKo || t.stadium})`
        ).join(', '));
      } else if (city.football?.note) {
        lines.push('축구: ' + city.football.note);
      }
      if (city.restaurants) {
        const labels = { tapas: '타파스', fineDining: '파인다이닝', regional: '지역요리', cafes: '카페', bakeries: '베이커리' };
        Object.entries(city.restaurants).forEach(([key, list]) => {
          if (list?.length) {
            lines.push(`${labels[key] || key}: ` + list.map(r => `${r.name}(★${r.rating}, ${r.menu || r.desc})`).join(', '));
          }
        });
      }
      return lines.filter(Boolean).join('\n');
    };

    const buildSystemPrompt = (selectedCity, activeTab) => {
      const cityIndex = CITIES.map(c => `- ${c.nameKo} (${c.nameEn})`).join('\n');
      let prompt = `당신은 España Voyage 스페인 여행 가이드 AI입니다. 한국어로 친절하고 구체적으로 답변하세요.
대시보드에 등록된 ${CITIES.length}개 도시 정보를 바탕으로 명소, 맛집, 축구, 일정을 추천합니다.
모르는 정보는 지어내지 말고, 대시보드 데이터 범위 안에서 답하세요.

등록 도시 목록:
${cityIndex}`;

      if (selectedCity) {
        prompt += `\n\n사용자가 현재 보고 있는 도시:\n${summarizeCity(selectedCity)}`;
      }
      if (activeTab && activeTab !== 'guide') {
        prompt += `\n\n사용자는 Excel 일정 탭「${activeTab}」을 보고 있습니다.`;
      }
      return prompt;
    };

    const TravelChatbot = ({ selectedCity, activeTab }) => {
      const [open, setOpen] = useState(false);
      const [showSettings, setShowSettings] = useState(false);
      const [apiKey, setApiKey] = useState(() => localStorage.getItem(API_KEY_STORAGE) || '');
      const [model, setModel] = useState(() => localStorage.getItem(MODEL_STORAGE) || 'gpt-4o-mini');
      const [input, setInput] = useState('');
      const [loading, setLoading] = useState(false);
      const [error, setError] = useState('');
      const [messages, setMessages] = useState([
        {
          role: 'assistant',
          content: '¡Hola! 스페인 여행 도우미입니다 🌞\n도시 추천, 맛집, 일정 질문을 편하게 물어보세요.\n⚙️ 버튼에서 OpenAI API 키를 먼저 등록해 주세요.',
        },
      ]);
      const messagesEndRef = useRef(null);

      useEffect(() => {
        messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
      }, [messages, loading]);

      const saveSettings = () => {
        localStorage.setItem(API_KEY_STORAGE, apiKey.trim());
        localStorage.setItem(MODEL_STORAGE, model.trim());
        setShowSettings(false);
        setError('');
      };

      const sendMessage = async () => {
        const text = input.trim();
        if (!text || loading) return;
        if (!apiKey.trim()) {
          setError('OpenAI API 키를 ⚙️ 설정에서 입력해 주세요.');
          setShowSettings(true);
          return;
        }

        const userMessage = { role: 'user', content: text };
        const nextMessages = [...messages, userMessage];
        setMessages(nextMessages);
        setInput('');
        setLoading(true);
        setError('');

        const apiMessages = [
          { role: 'system', content: buildSystemPrompt(selectedCity, activeTab) },
          ...nextMessages
            .filter(m => m.role === 'user' || m.role === 'assistant')
            .slice(-12)
            .map(m => ({ role: m.role, content: m.content })),
        ];

        try {
          const res = await fetch(OPENAI_API_URL, {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json',
              Authorization: `Bearer ${apiKey.trim()}`,
            },
            body: JSON.stringify({
              model: model.trim() || 'gpt-4o-mini',
              messages: apiMessages,
              temperature: 0.7,
              max_tokens: 1200,
            }),
          });

          const data = await res.json();
          if (!res.ok) {
            throw new Error(data.error?.message || `API 오류 (${res.status})`);
          }

          const reply = data.choices?.[0]?.message?.content?.trim();
          if (!reply) throw new Error('응답이 비어 있습니다.');
          setMessages(prev => [...prev, { role: 'assistant', content: reply }]);
        } catch (err) {
          setError(err.message || '요청에 실패했습니다.');
        } finally {
          setLoading(false);
        }
      };

      const handleKeyDown = (e) => {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault();
          sendMessage();
        }
      };

      return (
        <>
          <AnimatePresence>
            {open && (
              <motion.div
                initial={{ opacity: 0, y: 20, scale: 0.95 }}
                animate={{ opacity: 1, y: 0, scale: 1 }}
                exit={{ opacity: 0, y: 20, scale: 0.95 }}
                className="fixed bottom-24 right-4 md:right-6 z-[100] w-[min(100vw-2rem,380px)] h-[min(70vh,520px)] glass-panel rounded-[2rem] border-2 border-white/70 shadow-2xl flex flex-col overflow-hidden"
              >
                <div className="px-4 py-3 bg-gradient-to-r from-primary to-orange-600 text-white flex items-center justify-between shrink-0">
                  <div className="flex items-center gap-2">
                    <span className="text-xl">🤖</span>
                    <div>
                      <p className="font-extrabold text-sm leading-tight">España Travel AI</p>
                      <p className="text-[10px] text-white/80">OpenAI GPT</p>
                    </div>
                  </div>
                  <div className="flex items-center gap-1">
                    <button
                      type="button"
                      onClick={() => setShowSettings(v => !v)}
                      className="w-8 h-8 rounded-xl bg-white/20 hover:bg-white/30 flex items-center justify-center text-sm"
                      title="API 설정"
                    >
                      ⚙️
                    </button>
                    <button
                      type="button"
                      onClick={() => setOpen(false)}
                      className="w-8 h-8 rounded-xl bg-white/20 hover:bg-white/30 flex items-center justify-center font-bold"
                    >
                      ✕
                    </button>
                  </div>
                </div>

                {showSettings && (
                  <div className="p-4 border-b border-outline-variant/30 bg-surface-container-low shrink-0 space-y-3">
                    <div>
                      <label className="text-[10px] font-bold uppercase tracking-wider text-outline block mb-1">OpenAI API Key</label>
                      <input
                        type="password"
                        value={apiKey}
                        onChange={(e) => setApiKey(e.target.value)}
                        placeholder="sk-..."
                        className="w-full px-3 py-2 rounded-xl border border-outline-variant/40 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-primary-container/50"
                      />
                    </div>
                    <div>
                      <label className="text-[10px] font-bold uppercase tracking-wider text-outline block mb-1">Model</label>
                      <select
                        value={model}
                        onChange={(e) => setModel(e.target.value)}
                        className="w-full px-3 py-2 rounded-xl border border-outline-variant/40 bg-white text-sm focus:outline-none focus:ring-2 focus:ring-primary-container/50"
                      >
                        <option value="gpt-4o-mini">gpt-4o-mini (권장)</option>
                        <option value="gpt-4o">gpt-4o</option>
                        <option value="gpt-4-turbo">gpt-4-turbo</option>
                        <option value="gpt-3.5-turbo">gpt-3.5-turbo</option>
                      </select>
                    </div>
                    <p className="text-[10px] text-outline leading-snug">키는 브라우저 localStorage에만 저장됩니다. 공개 배포 시 서버 프록시 사용을 권장합니다.</p>
                    <button
                      type="button"
                      onClick={saveSettings}
                      className="w-full py-2 rounded-xl bg-gradient-to-r from-primary-container to-yellow-400 text-white text-sm font-bold shadow-md"
                    >
                      저장
                    </button>
                  </div>
                )}

                <div className="flex-1 overflow-y-auto p-4 space-y-3 chat-scroll bg-white/40">
                  {messages.map((msg, i) => (
                    <div key={i} className={`flex ${msg.role === 'user' ? 'justify-end' : 'justify-start'}`}>
                      <div className={`max-w-[85%] px-3 py-2 rounded-2xl text-sm leading-relaxed whitespace-pre-wrap ${
                        msg.role === 'user'
                          ? 'bg-gradient-to-br from-primary to-orange-600 text-white rounded-br-md'
                          : 'bg-white border border-white/80 text-on-surface shadow-sm rounded-bl-md'
                      }`}>
                        {msg.content}
                      </div>
                    </div>
                  ))}
                  {loading && (
                    <div className="flex justify-start">
                      <div className="bg-white px-4 py-2 rounded-2xl text-sm text-outline shadow-sm flex items-center gap-2">
                        <span className="w-2 h-2 bg-primary-container rounded-full animate-bounce"></span>
                        <span className="w-2 h-2 bg-primary-container rounded-full animate-bounce" style={{ animationDelay: '0.15s' }}></span>
                        <span className="w-2 h-2 bg-primary-container rounded-full animate-bounce" style={{ animationDelay: '0.3s' }}></span>
                      </div>
                    </div>
                  )}
                  <div ref={messagesEndRef} />
                </div>

                {error && (
                  <div className="px-4 py-2 text-xs text-tertiary bg-red-50 border-t border-red-100 shrink-0">{error}</div>
                )}

                <div className="p-3 border-t border-white/60 bg-white/60 shrink-0">
                  {selectedCity && (
                    <p className="text-[10px] text-secondary font-bold mb-2 truncate">📍 {selectedCity.nameKo} 컨텍스트 연동됨</p>
                  )}
                  <div className="flex gap-2">
                    <textarea
                      value={input}
                      onChange={(e) => setInput(e.target.value)}
                      onKeyDown={handleKeyDown}
                      rows={2}
                      placeholder="예: 바르셀로나 2박 일정 추천해줘"
                      className="flex-1 px-3 py-2 rounded-xl border border-outline-variant/40 bg-white text-sm resize-none focus:outline-none focus:ring-2 focus:ring-primary-container/50"
                    />
                    <button
                      type="button"
                      onClick={sendMessage}
                      disabled={loading || !input.trim()}
                      className="self-end px-4 py-2 rounded-xl bg-gradient-to-br from-primary to-orange-600 text-white font-bold text-sm disabled:opacity-40 shadow-md"
                    >
                      전송
                    </button>
                  </div>
                </div>
              </motion.div>
            )}
          </AnimatePresence>

          <button
            type="button"
            onClick={() => setOpen(v => !v)}
            className="fixed bottom-6 right-4 md:right-6 z-[100] w-14 h-14 rounded-full bg-gradient-to-br from-primary to-orange-600 text-white shadow-2xl shadow-orange-500/40 flex items-center justify-center text-2xl hover:scale-105 active:scale-95 transition-transform sun-kissed-glow border-4 border-white/80"
            title="여행 AI 챗봇"
          >
            {open ? '✕' : '💬'}
          </button>
        </>
      );
    };

    const MapComponent = ({ selectedCity, activeLocation, onCitySelect }) => {
      const mapRef = useRef(null);
      const leafletMap = useRef(null);
      const cityMarkersRef = useRef({});
      const activeMarkerRef = useRef(null);

      useEffect(() => {
        if (!mapRef.current) return;

        leafletMap.current = L.map(mapRef.current, { zoomControl: false }).setView([39.3260685, -4.8379791], 6);
        L.control.zoom({ position: 'bottomright' }).addTo(leafletMap.current);

        L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
          attribution: '&copy; OpenStreetMap &copy; CARTO',
          subdomains: 'abcd',
          maxZoom: 20
        }).addTo(leafletMap.current);

        // Add City Markers
        CITIES.forEach(city => {
          const marker = L.circleMarker(city.coordinates, {
            radius: 8, fillColor: "#f97316", color: "#fff", weight: 3, opacity: 1, fillOpacity: 1
          }).addTo(leafletMap.current);

          marker.bindTooltip(`<b>${city.nameKo}</b><br><span style="font-size:0.8em;color:#666;">${city.nameEs}</span>`, { direction: 'top', offset: [0, -10], className: 'custom-tooltip' });
          marker.on('click', () => onCitySelect(city));
          cityMarkersRef.current[city.id] = marker;
        });

        return () => { if (leafletMap.current) leafletMap.current.remove(); };
      }, []);

      // Handle zooming to city or specific location
      useEffect(() => {
        if (leafletMap.current) {
          if (activeLocation) {
            // Zoom to specific attraction/restaurant
            leafletMap.current.flyTo(activeLocation.coords, 16, { animate: true, duration: 1.5 });
            
            // Manage active pointer marker
            if (activeMarkerRef.current) leafletMap.current.removeLayer(activeMarkerRef.current);
            
            const pinEmoji = activeLocation.type === 'stadium' ? '⚽' : activeLocation.type === 'restaurant' ? '🥘' : '📍';
            const customIcon = L.divIcon({
              html: `<div style="font-size:32px;filter:drop-shadow(0 4px 6px rgba(0,0,0,0.3));transform:translate(-50%,-100%);">${pinEmoji}</div>`,
              className: '', iconSize: [0,0], iconAnchor: [0,0]
            });
            activeMarkerRef.current = L.marker(activeLocation.coords, { icon: customIcon }).addTo(leafletMap.current);
            activeMarkerRef.current.bindTooltip(`<b>${activeLocation.name}</b>`, { direction: 'top', offset: [0, -35], className: 'custom-tooltip' }).openTooltip();

          } else if (selectedCity) {
            // Zoom to city
            leafletMap.current.flyTo(selectedCity.coordinates, selectedCity.zoom, { animate: true, duration: 1.5 });
            if (activeMarkerRef.current) {
               leafletMap.current.removeLayer(activeMarkerRef.current);
               activeMarkerRef.current = null;
            }
            // Highlight city marker
            Object.values(cityMarkersRef.current).forEach(m => m.setStyle({ fillColor: '#f97316', radius: 8, weight: 3 }));
            if (cityMarkersRef.current[selectedCity.id]) {
               cityMarkersRef.current[selectedCity.id].setStyle({ fillColor: '#bb171c', radius: 12, weight: 4 });
               cityMarkersRef.current[selectedCity.id].openTooltip();
            }
          } else {
            // Reset map
            leafletMap.current.flyTo([39.3260685, -4.8379791], 6, { animate: true, duration: 1.5 });
            if (activeMarkerRef.current) {
               leafletMap.current.removeLayer(activeMarkerRef.current);
               activeMarkerRef.current = null;
            }
            Object.values(cityMarkersRef.current).forEach(m => {
               m.setStyle({ fillColor: '#f97316', radius: 8, weight: 3 });
               m.closeTooltip();
            });
          }
        }
      }, [selectedCity, activeLocation]);

      return <div ref={mapRef} className="w-full h-full rounded-[2rem] overflow-hidden shadow-inner z-0 border-4 border-white/80" />;
    };
    
    const App = () => {
      const [sheets, setSheets] = useState([]);
      const [activeTab, setActiveTab] = useState("guide");
      const [selectedCity, setSelectedCity] = useState(null);
      const [activeLocation, setActiveLocation] = useState(null); // specific attraction/restaurant
      const [loading, setLoading] = useState(true);

      useEffect(() => {
        try {
          if (!window.excelBase64) throw new Error("No excel data found");
          const b64 = window.excelBase64.replace(/\s/g, '');
          const binaryStr = atob(b64);
          const len = binaryStr.length;
          const bytes = new Uint8Array(len);
          for (let i = 0; i < len; i++) bytes[i] = binaryStr.charCodeAt(i);
          
          const workbook = XLSX.read(bytes.buffer, { type: 'array' });
          const parsedSheets = workbook.SheetNames.map(name => {
            const worksheet = workbook.Sheets[name];
            const jsonData = XLSX.utils.sheet_to_json(worksheet, { defval: "" });
            let columns = [];
            if (jsonData.length > 0) columns = Object.keys(jsonData[0]).filter(col => !col.startsWith('__EMPTY'));
            return { name, data: jsonData, columns: columns };
          });
          setSheets(parsedSheets);
          setLoading(false);
        } catch (error) {
          console.error("Error parsing Excel:", error);
          setLoading(false);
        }
      }, []);

      const openGoogleMaps = (e, name, city) => {
        e.stopPropagation();

                          </tbody>
                        </table>
                      </div>
                    </div>
                  </motion.div>
                )}
              </AnimatePresence>

            </div>
          </div>
        </div>
        <TravelChatbot selectedCity={selectedCity} activeTab={activeTab} />
        </>
      );
    };

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
